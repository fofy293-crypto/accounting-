<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>حسابات أبو الزلف</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@700;800;900&family=Tajawal:wght@400;500;700;900&display=swap');
  :root{
    --ink:#1B1512; --surface:#241B16; --surface2:#302319; --line:rgba(243,232,217,0.09);
    --ember:#E8622F; --ember-dim:rgba(232,98,47,0.18); --saffron:#E8A63D;
    --zaatar:#8AA65A; --sumac:#C24A3A; --cream:#F3E8D9; --muted:#B8A996;
  }
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--cream);font-family:'Tajawal',sans-serif;}
  h1,h2,h3{font-family:'Cairo',sans-serif;margin:0;}
  button{font-family:'Tajawal',sans-serif;cursor:pointer;}
  input,select{font-family:'Tajawal',sans-serif;}
  #root{min-height:100vh;width:100%;}
  .az-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;height:100vh;color:var(--saffron);font-size:40px;}
  .az-spin{animation:az-flicker 1.1s ease-in-out infinite;}
  @keyframes az-flicker{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.6;transform:scale(.92);}}

  .az-header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:linear-gradient(180deg,var(--surface),var(--ink));border-bottom:1px solid var(--line);flex-wrap:wrap;gap:12px;}
  .az-brand{display:flex;align-items:center;gap:12px;}
  .az-brand-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(145deg,var(--ember),var(--sumac));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(232,98,47,.35);}
  .az-brand h1{font-size:20px;font-weight:900;}
  .az-brand span{font-size:12px;color:var(--saffron);}
  .az-sync{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);}
  .az-sync-btn{display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line);color:var(--cream);padding:8px 14px;border-radius:9px;font-size:12.5px;font-weight:700;}
  .az-sync-btn:hover{border-color:var(--ember);}
  .az-sync-dot{width:8px;height:8px;border-radius:50%;background:var(--zaatar);}
  .az-sync-dot.err{background:var(--sumac);}
  .az-sync-dot.busy{background:var(--saffron);animation:az-flicker 0.8s infinite;}

  .az-acc{padding:22px;}
  .az-acc-nav{display:flex;gap:8px;background:var(--surface2);padding:5px;border-radius:12px;margin-bottom:18px;width:fit-content;flex-wrap:wrap;}
  .az-acc-nav button{display:flex;align-items:center;gap:6px;border:none;background:transparent;color:var(--muted);padding:9px 15px;border-radius:9px;font-size:13px;font-weight:700;}
  .az-acc-nav button.active{background:var(--saffron);color:#241B16;}
  .az-period-row{display:flex;gap:8px;margin-bottom:16px;}
  .az-period{border:1px solid var(--line);background:var(--surface);color:var(--muted);padding:8px 16px;border-radius:999px;font-size:12.5px;font-weight:700;}
  .az-period.active{background:var(--ember);border-color:var(--ember);color:#fff;}

  .az-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px;}
  .az-stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:8px;}
  .az-stat-label{font-size:12.5px;color:var(--muted);font-weight:700;}
  .az-stat-value{font-size:24px;font-weight:900;color:var(--saffron);font-family:'Cairo',sans-serif;}
  .az-pos-val{color:var(--zaatar)!important;}
  .az-neg-val{color:var(--sumac)!important;}
  .az-net-panel{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,rgba(138,166,90,.16),rgba(138,166,90,.05));border:1px solid rgba(138,166,90,.35);color:var(--zaatar);border-radius:14px;padding:20px 24px;margin-bottom:18px;font-size:26px;}
  .az-net-panel-neg{background:linear-gradient(135deg,rgba(194,74,58,.16),rgba(194,74,58,.05));border-color:rgba(194,74,58,.35);color:var(--sumac);}
  .az-net-label{display:block;font-size:12.5px;font-weight:700;opacity:.85;margin-bottom:4px;}
  .az-net-value{display:block;font-size:26px;font-weight:900;font-family:'Cairo',sans-serif;color:var(--cream);}

  .az-dash-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:14px;}
  .az-panel{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .az-panel h3{display:flex;align-items:center;gap:7px;font-size:14.5px;margin-bottom:14px;color:var(--cream);}
  .az-panel-wide{grid-column:1/-1;}
  .az-empty{color:var(--muted);font-size:13px;padding:12px 4px;}
  .az-bars{display:flex;flex-direction:column;gap:10px;}
  .az-bar-row{display:flex;align-items:center;gap:10px;}
  .az-bar-label{width:70px;font-size:12px;color:var(--muted);flex-shrink:0;}
  .az-bar-track{flex:1;height:12px;background:var(--surface2);border-radius:999px;overflow:hidden;}
  .az-bar-fill{height:100%;background:linear-gradient(90deg,var(--ember),var(--saffron));border-radius:999px;}
  .az-bar-val{width:90px;text-align:left;font-size:12.5px;font-weight:800;color:var(--cream);flex-shrink:0;}

  .az-form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .az-form-row input,.az-form-row select{background:var(--surface2);border:1px solid var(--line);color:var(--cream);border-radius:9px;padding:10px 12px;font-size:13px;outline:none;}
  .az-form-row input:focus,.az-form-row select:focus{border-color:var(--ember);}
  .az-form-note{flex:1;min-width:140px;}
  .az-add-btn{display:flex;align-items:center;gap:6px;background:var(--ember);color:#fff;border:none;border-radius:9px;padding:10px 16px;font-weight:800;font-size:13px;}

  .az-list{display:flex;flex-direction:column;gap:6px;margin-top:12px;}
  .az-list-row{display:flex;align-items:center;gap:12px;font-size:12.5px;padding:10px 12px;background:var(--surface2);border-radius:9px;}
  .az-list-date{color:var(--muted);width:120px;flex-shrink:0;font-weight:700;}
  .az-list-cat{color:var(--saffron);font-weight:700;width:130px;flex-shrink:0;}
  .az-list-note{flex:1;color:var(--cream);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .az-list-amt{font-weight:900;flex-shrink:0;}
  .az-del-btn{background:transparent;border:none;color:var(--muted);flex-shrink:0;}

  .az-supplier-card{padding:0;overflow:hidden;}
  .az-supplier-head{width:100%;display:flex;align-items:center;gap:14px;background:transparent;border:none;padding:16px 18px;color:var(--cream);}
  .az-supplier-name{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;flex:1;}
  .az-supplier-phone{color:var(--muted);font-size:12px;font-weight:400;}
  .az-supplier-balance{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .az-supplier-balance-label{font-size:11px;color:var(--muted);}
  .az-supplier-detail{padding:0 18px 18px;border-top:1px solid var(--line);padding-top:14px;}

  .az-emp-card{display:flex;flex-direction:column;gap:12px;}
  .az-emp-head{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
  .az-emp-name{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;}
  .az-emp-role{color:var(--muted);font-size:12px;font-weight:400;}
  .az-emp-nums{display:flex;gap:16px;font-size:12.5px;color:var(--cream);flex-wrap:wrap;}

  .az-alert-row{display:flex;align-items:center;gap:10px;font-size:12.5px;padding:9px 12px;background:rgba(194,74,58,.12);border:1px solid rgba(194,74,58,.3);border-radius:9px;margin-bottom:6px;}
  .az-alert-name{flex:1;font-weight:700;}

  .az-settings-box{max-width:560px;}
  .az-settings-box input{width:100%;margin-bottom:10px;}
  .az-help{font-size:12px;color:var(--muted);line-height:1.8;margin-top:10px;}
  .az-help code{background:var(--surface2);padding:2px 6px;border-radius:5px;}

  .az-toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--zaatar);color:#1B1512;padding:12px 22px;border-radius:999px;display:flex;align-items:center;gap:8px;font-weight:800;font-size:13.5px;box-shadow:0 10px 26px rgba(0,0,0,.35);z-index:50;}
  .az-toast.err{background:var(--sumac);color:#fff;}

  @media (max-width:860px){ .az-dash-grid{grid-template-columns:1fr;} .az-sync span.az-sync-label{display:none;} }
</style>
</head>
<body>
<div id="root"><div class="az-loading"><span class="az-spin">🔥</span><p style="font-size:14px;">جاري تحميل النظام...</p></div></div>

<script>
/* ====================== CONSTANTS ====================== */
const SHEET_NAMES = { orders:"الطلبات", suppliers:"الموردين", invoices:"فواتير الموردين", inventory:"المخزون", till:"الخزنة" };
const EXPENSE_CATEGORIES = ["إيجار", "فواتير (كهرباء/مياه/غاز)", "صيانة", "تسويق ودعاية", "نقل وتوصيل", "مصاريف تشغيل أخرى"];
const WEEKDAYS = ["أحد","إثنين","ثلاثاء","أربعاء","خميس","جمعة","سبت"];
const LS_SETTINGS = "abuzalaf_acc_settings";
const LS_CACHE = "abuzalaf_acc_remote_cache";
const PERIOD_LABEL = { today:"النهاردة", week:"آخر 7 أيام", month:"آخر 30 يوم", all:"كل الفترات" };
const TILL_LABELS = { sale:"بيع (أوردر)", purchase:"دفعة لمورد", expense:"مصروف", deposit:"إيداع", withdraw:"سحب (للمالك)", opening:"رصيد افتتاحي" };

/* ====================== STATE ====================== */
let state = {
  tab: "overview", period: "today",
  sheetId: "", sheetLinkRaw: "", lastSync: null, syncing: false, syncError: null,
  ordersRemote: [], suppliersRemote: [], invoicesRemote: [], inventoryRemote: [],
  tillRemote: [], tillSummary: null,
  expandedSupplier: null, toast: null,
};

function loadLocal(){
  try{
    const raw = localStorage.getItem(LS_SETTINGS);
    if(raw) Object.assign(state, JSON.parse(raw));
  }catch(e){}
  try{
    const raw = localStorage.getItem(LS_CACHE);
    if(raw) Object.assign(state, JSON.parse(raw));
  }catch(e){}
}
function saveSettings(){
  localStorage.setItem(LS_SETTINGS, JSON.stringify({ sheetId: state.sheetId, sheetLinkRaw: state.sheetLinkRaw, lastSync: state.lastSync }));
}
function saveCache(){
  localStorage.setItem(LS_CACHE, JSON.stringify({
    ordersRemote: state.ordersRemote, suppliersRemote: state.suppliersRemote,
    invoicesRemote: state.invoicesRemote, inventoryRemote: state.inventoryRemote,
    tillRemote: state.tillRemote, tillSummary: state.tillSummary,
  }));
}


/* ====================== HELPERS ====================== */
function fmt(n){ return `${Math.round(n).toLocaleString("en-US")} ج.م`; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function esc(s){ return (s||"").toString().replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function withinPeriod(d, period){
  if(!d || isNaN(d.getTime())) return false;
  const now = new Date();
  const diffDays = (now-d)/(1000*60*60*24);
  if(period==="today") return d.toDateString()===now.toDateString();
  if(period==="week") return diffDays>=0 && diffDays<=7;
  if(period==="month") return diffDays>=0 && diffDays<=30;
  return true;
}
function toAsciiDigits(str){
  const map = {'٠':'0','١':'1','٢':'2','٣':'3','٤':'4','٥':'5','٦':'6','٧':'7','٨':'8','٩':'9'};
  return String(str).replace(/[٠-٩]/g, d=>map[d]);
}
function parseNum(v){
  if(v==null) return 0;
  const ascii = toAsciiDigits(v);
  const cleaned = ascii.replace(/[^\d.-]/g,'');
  return cleaned ? parseFloat(cleaned) : 0;
}
function parseArabicDateTime(str){
  if(!str) return null;
  let s = toAsciiDigits(str).replace(/[\u200e\u200f]/g,'').trim();
  s = s.replace('،', ',');
  const parts = s.split(',');
  if(parts.length<2) return null;
  const datePart = parts[0].trim(), timePart = parts.slice(1).join(',').trim();
  const dm = datePart.split('/').map(x=>parseInt(x,10));
  if(dm.length<3) return null;
  const [d,m,y] = dm;
  const isPM = timePart.includes('م') && !timePart.includes('ص');
  const isAM = timePart.includes('ص');
  const timeClean = timePart.replace(/[صم]/g,'').trim();
  const tparts = timeClean.split(':').map(x=>parseInt(x,10));
  let hh = tparts[0]||0, mm = tparts[1]||0, ss = tparts[2]||0;
  if(isPM && hh<12) hh+=12;
  if(isAM && hh===12) hh=0;
  const dt = new Date(y, (m-1), d, hh, mm, ss);
  return isNaN(dt.getTime()) ? null : dt;
}
function parseDateSmart(isoStr, arabicStr){
  if(isoStr){ const d = new Date(isoStr); if(!isNaN(d.getTime())) return d; }
  return parseArabicDateTime(arabicStr);
}
let toastTimer=null;
function showToast(msg, isErr){
  state.toast = { msg, isErr };
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ state.toast=null; render(); }, 2800);
}

/* ====================== ICONS ====================== */
function ic(name, size=16){
  const s=size;
  const svgs = {
    plus:`<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>`,
    trash:`<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M8 6V4h8v2"/>`,
    chevronDown:`<polyline points="6 9 12 15 18 9"/>`,
    chevronUp:`<polyline points="18 15 12 9 6 15"/>`,
    check:`<polyline points="20 6 9 17 4 12"/>`,
    trendUp:`<polyline points="3 17 9 11 13 15 21 6"/><polyline points="14 6 21 6 21 13"/>`,
    trendDown:`<polyline points="3 7 9 13 13 9 21 18"/><polyline points="21 11 21 18 14 18"/>`,
    receipt:`<path d="M6 3h12v18l-3-2-3 2-3-2-3 2V3z"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="9" y1="12" x2="15" y2="12"/>`,
    refresh:`<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>`,
    alert:`<path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.86l-8.18 14.18A2 2 0 0 0 4 21h16a2 2 0 0 0 1.89-2.96L13.71 3.86a2 2 0 0 0-3.42 0z"/>`,
    userPlus:`<circle cx="9" cy="8" r="3.5"/><path d="M3 20c0-3.5 2.7-6 6-6s6 2.5 6 6"/><line x1="18" y1="8" x2="18" y2="14"/><line x1="15" y1="11" x2="21" y2="11"/>`,
  };
  return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0">${svgs[name]||""}</svg>`;
}

/* ====================== CSV FETCH + PARSE ====================== */
function parseCSV(text){
  const rows=[]; let row=[]; let field=''; let inQuotes=false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQuotes){
      if(c==='"'){ if(text[i+1]==='"'){ field+='"'; i++; } else inQuotes=false; }
      else field+=c;
    } else {
      if(c==='"') inQuotes=true;
      else if(c===','){ row.push(field); field=''; }
      else if(c==='\r'){ /* skip */ }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=''; }
      else field+=c;
    }
  }
  if(field.length>0 || row.length>0){ row.push(field); rows.push(row); }
  return rows.filter(r=>r.some(c=>c && c.trim()!==''));
}
function rowsToObjects(rows){
  if(rows.length===0) return [];
  const headers = rows[0].map(h=>h.trim());
  return rows.slice(1).map(r=>{
    const o={};
    headers.forEach((h,i)=>{ o[h]=r[i]!==undefined?r[i]:""; });
    return o;
  });
}
function extractSheetId(link){
  const m = link.match(/\/d\/([a-zA-Z0-9-_]+)/);
  return m ? m[1] : link.trim();
}
async function fetchRawRows(sheetId, tabName){
  const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(tabName)}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`تعذر قراءة صفحة "${tabName}"`);
  const text = await res.text();
  if(text.trim().startsWith("<")) throw new Error(`صفحة "${tabName}" مش متاحة أو الرابط غلط`);
  return parseCSV(text);
}
async function fetchSheetTab(sheetId, tabName){
  return rowsToObjects(await fetchRawRows(sheetId, tabName));
}
async function fetchTillTab(sheetId, tabName){
  // شيت "الخزنة" فيه صف ملخص أرصدة فوق، وبعده صف العناوين، وبعده الحركات
  const rows = await fetchRawRows(sheetId, tabName);
  if(rows.length===0) return { summary:null, rows:[] };
  const summaryRaw = rows[0];
  const summary = {
    total: parseNum(summaryRaw[1]),
    cash: parseNum(summaryRaw[3]),
    visa: parseNum(summaryRaw[5]),
    instapay: parseNum(summaryRaw[7]),
  };
  if(rows.length<2) return { summary, rows:[] };
  const headers = rows[1].map(h=>h.trim());
  const data = rows.slice(2).map(r=>{
    const o={};
    headers.forEach((h,i)=>{ o[h]=r[i]!==undefined?r[i]:""; });
    return o;
  });
  return { summary, rows: data };
}
async function syncNow(){
  if(!state.sheetId){ showToast("الصق رابط الشيت الأول من صفحة الإعدادات", true); return; }
  state.syncing = true; state.syncError = null; render();
  try{
    const [orders, suppliers, invoices, inventory, till] = await Promise.all([
      fetchSheetTab(state.sheetId, SHEET_NAMES.orders),
      fetchSheetTab(state.sheetId, SHEET_NAMES.suppliers),
      fetchSheetTab(state.sheetId, SHEET_NAMES.invoices),
      fetchSheetTab(state.sheetId, SHEET_NAMES.inventory),
      fetchTillTab(state.sheetId, SHEET_NAMES.till),
    ]);
    state.ordersRemote = orders;
    state.suppliersRemote = suppliers;
    state.invoicesRemote = invoices;
    state.inventoryRemote = inventory;
    state.tillRemote = till.rows;
    state.tillSummary = till.summary;
    state.lastSync = new Date().toISOString();
    saveCache(); saveSettings();
    showToast("تمت المزامنة مع الشيت بنجاح");
  }catch(e){
    state.syncError = e.message || "فشلت المزامنة";
    showToast(state.syncError, true);
  }
  state.syncing = false;
  render();
}
function connectSheet(){
  const link = document.getElementById("sheet-link-input").value.trim();
  if(!link) return;
  state.sheetLinkRaw = link;
  state.sheetId = extractSheetId(link);
  saveSettings();
  syncNow();
}
function disconnectSheet(){
  state.sheetId=""; state.sheetLinkRaw=""; state.lastSync=null;
  state.ordersRemote=[]; state.suppliersRemote=[]; state.invoicesRemote=[]; state.inventoryRemote=[];
  saveSettings(); saveCache(); render();
}

/* ====================== DERIVED DATA ====================== */
function getOrdersParsed(){
  return state.ordersRemote.map(o=>({
    id: o["رقم الأوردر"],
    date: parseDateSmart(o["وقت ISO"], o["التاريخ والوقت"]),
    type: o["نوع الأوردر"],
    payment: o["وسيلة الدفع"],
    items: o["الأصناف"],
    total: parseNum(o["الإجمالي"]),
  })).filter(o=>o.date);
}
function getInvoicesGrouped(){
  const map = {};
  state.invoicesRemote.forEach(r=>{
    const id = r["رقم الفاتورة"];
    if(!id) return;
    if(!map[id]){
      map[id] = {
        id, supplier: r["المورد"],
        date: parseArabicDateTime(r["التاريخ"]),
        total: parseNum(r["إجمالي الفاتورة"]),
        paid: parseNum(r["المدفوع"]),
        remaining: parseNum(r["المتبقي"]),
        lines: [],
      };
    }
    map[id].lines.push({ item: r["الصنف"], qty: parseNum(r["الكمية"]), unit: parseNum(r["سعر الوحدة"]), lineTotal: parseNum(r["إجمالي السطر"]) });
  });
  return Object.values(map);
}

/* ====================== DERIVED: expenses & withdrawals from till ====================== */
function getTillMovements(){
  return state.tillRemote.map(r=>({
    date: parseDateSmart(r["وقت ISO"], r["التاريخ والوقت"]),
    rawType: r["النوع (خام)"],
    typeLabel: TILL_LABELS[r["النوع (خام)"]] || r["النوع"] || r["النوع (خام)"],
    method: r["وسيلة الدفع"],
    amount: Math.abs(parseNum(r["القيمة"])),
    note: r["ملاحظة"],
  })).filter(m=>m.date);
}
function getExpenseMovements(){
  // بس الحركات اللي هي مصروف تشغيلي أو سحب للمالك (زرار "مصروف / سحب" في الخزنة)
  return getTillMovements().filter(m=>m.rawType==="expense" || m.rawType==="withdraw");
}
function toggleSupplier(name){ state.expandedSupplier = state.expandedSupplier===name ? null : name; render(); }

/* ====================== P&L ====================== */
function computePnl(){
  const orders = getOrdersParsed().filter(o=>withinPeriod(o.date, state.period));
  const revenue = orders.reduce((s,o)=>s+o.total,0);
  const invoices = getInvoicesGrouped().filter(i=>withinPeriod(i.date, state.period));
  const purchaseTotal = invoices.reduce((s,i)=>s+i.total,0);

  const expMovements = getExpenseMovements().filter(m=>withinPeriod(m.date, state.period));
  const expTotal = expMovements.filter(m=>m.rawType==="expense").reduce((s,m)=>s+m.amount,0);
  const withdrawTotal = expMovements.filter(m=>m.rawType==="withdraw").reduce((s,m)=>s+m.amount,0);
  const net = revenue - purchaseTotal - expTotal - withdrawTotal;

  const byCat = {};
  expMovements.forEach(m=>{ byCat[m.typeLabel]=(byCat[m.typeLabel]||0)+m.amount; });
  const catBreakdown = Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const maxCat = catBreakdown.length ? catBreakdown[0][1] : 1;

  const byPayment = {};
  orders.forEach(o=>{ const k=o.payment||"غير محدد"; byPayment[k]=(byPayment[k]||0)+o.total; });
  const paymentBreakdown = Object.entries(byPayment).sort((a,b)=>b[1]-a[1]);
  const maxPay = paymentBreakdown.length ? Math.max(...paymentBreakdown.map(p=>p[1])) : 1;

  return { revenue, purchaseTotal, expTotal, withdrawTotal, net, catBreakdown, maxCat, paymentBreakdown, maxPay, orders, expMovements };
}

/* ====================== RENDER: OVERVIEW ====================== */
function renderOverview(){
  const p = computePnl();
  const allOrders = getOrdersParsed();
  const days = [];
  for(let i=6;i>=0;i--){
    const d = new Date(); d.setDate(d.getDate()-i);
    const key = d.toDateString();
    const sum = allOrders.filter(o=>o.date.toDateString()===key).reduce((s,o)=>s+o.total,0);
    days.push({ label: WEEKDAYS[d.getDay()], value: sum });
  }
  const maxDay = Math.max(1, ...days.map(d=>d.value));
  const alerts = state.inventoryRemote.filter(r=>parseNum(r["الكمية الحالية"]) <= parseNum(r["حد التنبيه"]));
  const suppliersTotalDebt = state.suppliersRemote.reduce((s,r)=>s+parseNum(r["المستحق عليه"]),0);

  return `
  <div class="az-period-row">
    ${["today","week","month","all"].map(k=>`<button class="az-period ${state.period===k?'active':''}" data-act="period" data-val="${k}">${PERIOD_LABEL[k]}</button>`).join("")}
  </div>
  <div class="az-stats">
    <div class="az-stat"><span class="az-stat-label">الإيرادات (${PERIOD_LABEL[state.period]})</span><span class="az-stat-value az-pos-val">${fmt(p.revenue)}</span></div>
    <div class="az-stat"><span class="az-stat-label">المشتريات (فواتير موردين)</span><span class="az-stat-value az-neg-val">${fmt(p.purchaseTotal)}</span></div>
    <div class="az-stat"><span class="az-stat-label">مصاريف تشغيلية (من الخزنة)</span><span class="az-stat-value az-neg-val">${fmt(p.expTotal)}</span></div>
    <div class="az-stat"><span class="az-stat-label">مسحوبات المالك (من الخزنة)</span><span class="az-stat-value az-neg-val">${fmt(p.withdrawTotal)}</span></div>
  </div>
  <div class="az-net-panel ${p.net<0?'az-net-panel-neg':''}">
    ${p.net>=0?ic('trendUp',26):ic('trendDown',26)}
    <div><span class="az-net-label">صافي الربح (${PERIOD_LABEL[state.period]})</span><span class="az-net-value">${fmt(p.net)}</span></div>
  </div>
  ${state.tillSummary?`
  <div class="az-panel">
    <h3>🧾 أرصدة الخزنة الحالية (لحظياً)</h3>
    <div class="az-stats" style="margin-bottom:0;">
      <div class="az-stat"><span class="az-stat-label">إجمالي رصيد الخزنة</span><span class="az-stat-value">${fmt(state.tillSummary.total)}</span></div>
      <div class="az-stat"><span class="az-stat-label">كاش</span><span class="az-stat-value">${fmt(state.tillSummary.cash)}</span></div>
      <div class="az-stat"><span class="az-stat-label">فيزا</span><span class="az-stat-value">${fmt(state.tillSummary.visa)}</span></div>
      <div class="az-stat"><span class="az-stat-label">انستاباي</span><span class="az-stat-value">${fmt(state.tillSummary.instapay)}</span></div>
    </div>
  </div>`:""}
  <div class="az-dash-grid">
    <div class="az-panel">
      <h3>${ic('trendUp',16)} الإيرادات آخر 7 أيام (من شيت الطلبات)</h3>
      ${days.every(d=>d.value===0)?`<p class="az-empty">مفيش بيانات — اعمل مزامنة الأول من الإعدادات</p>`:`
      <div class="az-bars">${days.map(d=>`
        <div class="az-bar-row"><span class="az-bar-label">${d.label}</span>
        <div class="az-bar-track"><div class="az-bar-fill" style="width:${(d.value/maxDay)*100}%"></div></div>
        <span class="az-bar-val">${fmt(d.value)}</span></div>`).join("")}</div>`}
    </div>
    <div class="az-panel">
      <h3>💳 المبيعات حسب وسيلة الدفع</h3>
      ${p.paymentBreakdown.length===0?`<p class="az-empty">لا يوجد بيانات في الفترة دي</p>`:`
      <div class="az-bars">${p.paymentBreakdown.map(([k,v])=>`
        <div class="az-bar-row"><span class="az-bar-label">${esc(k)}</span>
        <div class="az-bar-track"><div class="az-bar-fill" style="width:${(v/p.maxPay)*100}%"></div></div>
        <span class="az-bar-val">${fmt(v)}</span></div>`).join("")}</div>`}
    </div>
    <div class="az-panel">
      <h3>${ic('alert',16)} تنبيهات مخزون (${alerts.length})</h3>
      ${alerts.length===0?`<p class="az-empty">كل الأصناف فوق الحد الآمن 👍</p>`:
      alerts.slice(0,8).map(a=>`<div class="az-alert-row">${ic('alert',14)}<span class="az-alert-name">${esc(a["المكوّن"])}</span><span>${a["الكمية الحالية"]} ${esc(a["الوحدة"])}</span></div>`).join("")}
    </div>
    <div class="az-panel">
      <h3>🚚 إجمالي مديونية الموردين</h3>
      <p class="az-stat-value ${suppliersTotalDebt>0?'az-neg-val':'az-pos-val'}" style="font-size:22px;">${fmt(suppliersTotalDebt)}</p>
      <p class="az-empty" style="padding-top:6px;">من شيت "الموردين" — تفاصيل كل مورد في تاب الموردين</p>
    </div>
    <div class="az-panel az-panel-wide">
      <h3>${ic('receipt',16)} آخر الطلبات (من الشيت)</h3>
      ${allOrders.length===0?`<p class="az-empty">لسه مفيش بيانات — اعمل مزامنة</p>`:`
      <div class="az-list">${allOrders.slice(0,8).map(o=>`
        <div class="az-list-row"><span class="az-list-date">${o.date.toLocaleString("ar-EG",{hour:"2-digit",minute:"2-digit",day:"2-digit",month:"2-digit"})}</span>
        <span class="az-list-cat">${esc(o.payment)}</span>
        <span class="az-list-note">${esc(o.items).slice(0,90)}</span>
        <span class="az-list-amt az-pos-val">${fmt(o.total)}</span></div>`).join("")}</div>`}
    </div>
  </div>`;
}

/* ====================== RENDER: SUPPLIERS (read-only, from sheet) ====================== */
function renderSuppliers(){
  const invoices = getInvoicesGrouped();
  if(state.suppliersRemote.length===0){
    return `<p class="az-empty">لسه مفيش بيانات موردين — اعمل مزامنة من تاب الإعدادات</p>`;
  }
  return state.suppliersRemote.map(s=>{
    const name = s["اسم المورد"];
    const debt = parseNum(s["المستحق عليه"]);
    const isOpen = state.expandedSupplier===name;
    const supInvoices = invoices.filter(i=>i.supplier===name);
    return `
    <div class="az-panel az-supplier-card">
      <button class="az-supplier-head" data-act="toggle-supplier" data-id="${esc(name)}">
        <div class="az-supplier-name">🚚 <span>${esc(name)}</span>${s["تليفون"]?`<span class="az-supplier-phone">${esc(s["تليفون"])}</span>`:""}</div>
        <div class="az-supplier-balance"><span class="${debt>0?'az-neg-val':'az-pos-val'}">${fmt(debt)}</span>
        <span class="az-supplier-balance-label">${debt>0?'مديونية علينا':'مسدد بالكامل'}</span></div>
        ${isOpen?ic('chevronUp',18):ic('chevronDown',18)}
      </button>
      ${isOpen?`
      <div class="az-supplier-detail">
        ${s["ملاحظات"]?`<p class="az-empty" style="padding:0 0 8px;">ملاحظات: ${esc(s["ملاحظات"])}</p>`:""}
        <div class="az-list">
          ${supInvoices.length===0?`<p class="az-empty">لا يوجد فواتير مسجّلة لهذا المورد</p>`:supInvoices.map(inv=>`
            <div class="az-list-row">
              <span class="az-list-date">${inv.date?inv.date.toLocaleDateString("ar-EG"):"—"}</span>
              <span class="az-list-cat">فاتورة #${esc(inv.id)}</span>
              <span class="az-list-note">${inv.lines.map(l=>esc(l.item)).join("، ")}</span>
              <span class="az-list-amt az-neg-val">${fmt(inv.total)}</span>
            </div>`).join("")}
        </div>
      </div>`:""}
    </div>`;
  }).join("");
}

/* ====================== RENDER: EXPENSES (read-only, من الخزنة) ====================== */
function renderExpenses(){
  const movements = getExpenseMovements().sort((a,b)=>b.date-a.date);
  const totalExp = movements.filter(m=>m.rawType==="expense").reduce((s,m)=>s+m.amount,0);
  const totalWithdraw = movements.filter(m=>m.rawType==="withdraw").reduce((s,m)=>s+m.amount,0);
  return `
  <div class="az-panel">
    <p class="az-help" style="margin:0;">
      البيانات دي جاية تلقائي من زرار "مصروف / سحب" في شاشة الخزنة بنظام الكاشير — مفيش إدخال يدوي هنا، وأي حاجة تسجلها في المطعم هتظهر هنا بعد أول مزامنة.
    </p>
  </div>
  <div class="az-stats">
    <div class="az-stat"><span class="az-stat-label">إجمالي المصاريف التشغيلية</span><span class="az-stat-value az-neg-val">${fmt(totalExp)}</span></div>
    <div class="az-stat"><span class="az-stat-label">إجمالي مسحوبات المالك</span><span class="az-stat-value az-neg-val">${fmt(totalWithdraw)}</span></div>
  </div>
  <div class="az-panel">
    <h3>💰 سجل المصاريف والمسحوبات (${movements.length}) — من شيت "${SHEET_NAMES.till}"</h3>
    ${movements.length===0?`<p class="az-empty">لسه مفيش مصاريف أو مسحوبات مسجّلة — اعمل مزامنة من تاب الإعدادات</p>`:`
    <div class="az-list">${movements.map(m=>`
      <div class="az-list-row"><span class="az-list-date">${m.date.toLocaleString("ar-EG",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</span>
      <span class="az-list-cat">${esc(m.typeLabel)}</span>
      <span class="az-list-note">${esc(m.note)} ${m.method?` — ${esc(m.method)}`:""}</span>
      <span class="az-list-amt az-neg-val">${fmt(m.amount)}</span></div>`).join("")}</div>`}
  </div>`;
}

/* ====================== RENDER: SETTINGS ====================== */
function renderSettings(){
  return `
  <div class="az-panel az-settings-box">
    <h3>🔗 ربط شيت الكاشير</h3>
    <input type="text" id="sheet-link-input" placeholder="الصق رابط الشيت هنا (docs.google.com/spreadsheets/d/...)" value="${esc(state.sheetLinkRaw)}"/>
    <div class="az-form-row">
      <button class="az-add-btn" onclick="connectSheet()">${ic('refresh',15)} ربط ومزامنة</button>
      ${state.sheetId?`<button class="az-add-btn" style="background:var(--surface2);color:var(--muted);" onclick="disconnectSheet()">فصل الربط</button>`:""}
    </div>
    <div class="az-help">
      لازم يكون الشيت مشارك بصيغة "Anyone with the link can view".<br/>
      النظام بيقرأ 5 صفحات بالاسم بالظبط: <code>الطلبات</code>، <code>الموردين</code>، <code>فواتير الموردين</code>، <code>المخزون</code>، <code>الخزنة</code>.<br/>
      لو غيّرت اسم أي صفحة في شيتك، لازم يترجع لنفس الاسم ده أو قولّي أظبط الأسماء في الكود.
    </div>
  </div>
  ${state.sheetId?`
  <div class="az-panel az-settings-box">
    <h3>📡 حالة المزامنة</h3>
    <p style="font-size:13px;">آخر مزامنة: ${state.lastSync?new Date(state.lastSync).toLocaleString("ar-EG"):"لسه ماحصلتش"}</p>
    <p style="font-size:13px;">عدد الطلبات المقروءة: ${state.ordersRemote.length}</p>
    <p style="font-size:13px;">عدد الموردين: ${state.suppliersRemote.length}</p>
    <p style="font-size:13px;">عدد أسطر الفواتير: ${state.invoicesRemote.length}</p>
    <p style="font-size:13px;">عدد أصناف المخزون: ${state.inventoryRemote.length}</p>
    ${state.syncError?`<p style="font-size:13px;color:var(--sumac);">آخر خطأ: ${esc(state.syncError)}</p>`:""}
  </div>`:""}`;
}

/* ====================== ROOT RENDER ====================== */
function renderHeader(){
  const dotClass = state.syncing ? 'busy' : (state.syncError ? 'err' : (state.lastSync ? '' : 'err'));
  const lastSyncTxt = state.lastSync ? new Date(state.lastSync).toLocaleTimeString("ar-EG",{hour:"2-digit",minute:"2-digit"}) : "لسه ماتزامنش";
  return `
  <header class="az-header">
    <div class="az-brand"><div class="az-brand-icon">🧮</div><div><h1>حسابات أبو الزلف</h1><span>مربوط بشيت الكاشير</span></div></div>
    <nav class="az-acc-nav" style="margin:0;">
      <button class="${state.tab==='overview'?'active':''}" data-act="tab" data-val="overview">🧮 نظرة عامة</button>
      <button class="${state.tab==='suppliers'?'active':''}" data-act="tab" data-val="suppliers">🚚 الموردين</button>
      <button class="${state.tab==='expenses'?'active':''}" data-act="tab" data-val="expenses">💰 المصاريف</button>
      <button class="${state.tab==='settings'?'active':''}" data-act="tab" data-val="settings">⚙️ الإعدادات</button>
    </nav>
    <div class="az-sync">
      <span class="az-sync-dot ${dotClass}"></span>
      <span class="az-sync-label">${state.syncing?'بيتزامن...':lastSyncTxt}</span>
      <button class="az-sync-btn" data-act="sync">${ic('refresh',14)} مزامنة</button>
    </div>
  </header>`;
}
function render(){
  let body = "";
  if(state.tab==='overview') body = renderOverview();
  else if(state.tab==='suppliers') body = renderSuppliers();
  else if(state.tab==='expenses') body = renderExpenses();
  else if(state.tab==='settings') body = renderSettings();
  document.getElementById("root").innerHTML = renderHeader() + `<div class="az-acc">${body}</div>` +
    (state.toast?`<div class="az-toast ${state.toast.isErr?'err':''}">${ic('check',16)} ${esc(state.toast.msg)}</div>`:"");
}

/* ====================== EVENTS ====================== */
function handleClick(e){
  const el = e.target.closest("[data-act]");
  if(!el) return;
  const act = el.dataset.act, id = el.dataset.id, val = el.dataset.val;
  if(act==="tab"){ state.tab=val; render(); }
  else if(act==="period"){ state.period=val; render(); }
  else if(act==="sync"){ syncNow(); }
  else if(act==="toggle-supplier"){ toggleSupplier(id); }
}
document.addEventListener("click", handleClick);

/* ====================== INIT ====================== */
loadLocal();
render();
if(state.sheetId){ syncNow(); }
setInterval(()=>{ if(state.sheetId && !state.syncing) syncNow(); }, 5*60*1000);
</script>
